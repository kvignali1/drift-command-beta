<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drift Command</title>
  <link rel="stylesheet" href="/static/css/style.css?v=7" />
</head>
<body>
  <div class="app-shell">
    <div id="page-track" class="page-track">
      <section class="page">
        <div class="dashboard">
          <div class="header">
            <div class="brand">DRIFT COMMAND</div>
            <div class="subbrand">Left Foot Brake Industries</div>
          </div>

          <div class="main-panel">
            <div class="gear-card">
              <div class="label">GEAR</div>
              <div id="gear" class="gear-value">N</div>
            </div>

            <div class="rpm-card">
              <div class="label">RPM</div>

              <div class="rpm-readout">
                <span id="rpm-text">0</span>
                <span class="rpm-max"> / <span id="rpm-max">9000</span></span>
              </div>

              <div class="rpm-bar-outer">
                <div id="rpm-bar" class="rpm-bar-inner"></div>
              </div>

              <div id="shift-lights" class="shift-lights">
                <div class="light"></div>
                <div class="light"></div>
                <div class="light"></div>
                <div class="light"></div>
                <div class="light"></div>
                <div class="light"></div>
                <div class="light"></div>
                <div class="light"></div>
              </div>
            </div>
          </div>

          <div class="swipe-hint">Swipe right for button box</div>
        </div>
      </section>

      <section class="page">
        <div class="dashboard">
          <div class="button-box-topbar">
            <div class="menu-wrap">
              <button id="button-box-menu-toggle" class="menu-toggle" type="button" aria-expanded="false" aria-controls="button-box-menu">
                Menu +
              </button>
              <div id="button-box-menu" class="menu-dropdown">
                <button class="menu-item" type="button">Settings</button>
                <button class="menu-item" type="button">Edit Layout</button>
              </div>
            </div>
          </div>

          <div class="header">
            <div class="brand">BUTTON BOX</div>
            <div class="subbrand">Choose a starter layout for your button box</div>
          </div>

          <div class="layout-empty-state">
            <div class="layout-card">
              <div class="layout-title">Create Layout</div>
              <div class="layout-copy">Start with a preset button layout, then we can customize it however you want.</div>
              <button id="create-layout-button" class="create-layout-button" type="button">Create Layout</button>
            </div>
          </div>

          <div id="layout-picker" class="layout-picker">
            <button class="layout-option" type="button">
              <div class="layout-option-title">4 Button Layout</div>
              <div class="layout-option-preview preview-four">
                <span class="layout-slot"></span>
                <span class="layout-slot"></span>
                <span class="layout-slot"></span>
                <span class="layout-slot"></span>
              </div>
            </button>

            <button class="layout-option" type="button">
              <div class="layout-option-title">6 Button Layout</div>
              <div class="layout-option-preview preview-six">
                <div class="preview-column">
                  <span class="layout-slot"></span>
                  <span class="layout-slot"></span>
                  <span class="layout-slot"></span>
                </div>
                <div class="preview-column">
                  <span class="layout-slot"></span>
                  <span class="layout-slot"></span>
                  <span class="layout-slot"></span>
                </div>
              </div>
            </button>

            <button class="layout-option" type="button">
              <div class="layout-option-title">3 Button Layout</div>
              <div class="layout-option-preview preview-three">
                <span class="layout-slot preview-large"></span>
                <div class="preview-column">
                  <span class="layout-slot"></span>
                  <span class="layout-slot"></span>
                </div>
              </div>
            </button>
          </div>

          <div class="swipe-hint">Swipe left to return to dashboard</div>
        </div>
      </section>
    </div>
  </div>

  <div class="page-dots" aria-hidden="true">
    <span id="dot-0" class="page-dot active"></span>
    <span id="dot-1" class="page-dot"></span>
  </div>

  <script src="/static/js/app.js?v=7"></script>
</body>
</html>
